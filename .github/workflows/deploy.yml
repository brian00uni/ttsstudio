name: Deploy

# Every push to main deploys both the Vercel frontend and the HF Space backend.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  vercel:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel (production)
        # Build on Vercel's cloud so project env vars (SUPABASE_URL/ANON_KEY)
        # are injected into the build (build-web.sh reads them). A local
        # `vercel build` does NOT expose project env vars to the build shell.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

  huggingface:
    name: Deploy backend (HF Space)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bash deploy/push-hf-space.sh brian00uni/ttsstudio-backend
