# Render Blueprint — Supertonic3 TTS backend (always-on inference server)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ttsstudio-backend
    runtime: docker
    repo: https://github.com/brian00uni/ttsstudio
    dockerfilePath: supertonic3-local-tts/Dockerfile
    dockerContext: supertonic3-local-tts
    plan: free           # free: 512MB RAM, spins down when idle, no persistent disk
    region: singapore    # closest Render region to Korea
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPERTONIC3_PUBLIC_MODE
        value: "1"
      - key: SUPERTONIC3_OUTPUT_DIR
        value: /app/data
      # No persistent disk on free tier: model re-downloads from HuggingFace
      # on each cold start (ephemeral container storage).
      - key: HF_HOME
        value: /app/.hf-cache
    # NOTE: free tier has no disk + 512MB RAM. If synthesis OOMs, the only fix
    # is a paid plan (starter $7 / standard $25 with 2GB). Add a disk block then.
